services:
  - type: web
    name: download-everything-backend
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://your-frontend.vercel.app
    healthCheckPath: /health
    # Free tier limitations
    autoDeploy: true
    # Disk cleanup strategy
    disk:
      name: download-everything-temp
      mountPath: /tmp/download-everything
      sizeGB: 1
